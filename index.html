<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dungeon Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #eee;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }
        #game-container {
            max-width: 800px;
            width: 100%;
        }
        #header {
            background: #16213e;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .stat { font-size: 14px; }
        .hp-bar {
            width: 100px;
            height: 12px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
        }
        .hp-fill { height: 100%; background: #e74c3c; transition: width 0.3s; }
        #main-area {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        #map-container {
            background: #0f0f23;
            border: 2px solid #4a4a6a;
            border-radius: 8px;
            padding: 5px;
            flex: 1;
            min-width: 300px;
        }
        #map {
            font-family: monospace;
            font-size: 14px;
            line-height: 1.2;
            white-space: pre;
            letter-spacing: 2px;
        }
        #side-panel {
            width: 200px;
            background: #16213e;
            border-radius: 8px;
            padding: 10px;
            font-size: 12px;
        }
        #messages {
            background: #0f0f23;
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
            min-height: 60px;
            font-size: 12px;
        }
        .msg { margin: 2px 0; }
        #controls {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .ctrl-row { display: flex; gap: 5px; }
        .ctrl-btn {
            width: 50px;
            height: 50px;
            font-size: 20px;
            background: #4a4a6a;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            touch-action: manipulation;
        }
        .ctrl-btn:active { background: #6a6a8a; }
        .action-btns {
            display: flex;
            gap: 5px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .action-btn {
            padding: 10px 15px;
            background: #2d4a6a;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        .action-btn:active { background: #4a6a8a; }
        .action-btn.flame { background: #1e3a5f; border: 1px solid #3498db; }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a1a2e;
            border: 2px solid #4a4a6a;
            border-radius: 8px;
            padding: 20px;
            max-width: 90%;
            max-height: 80%;
            overflow-y: auto;
            min-width: 300px;
        }
        .modal-title {
            font-size: 18px;
            color: #f1c40f;
            margin-bottom: 15px;
            text-align: center;
        }
        .item-list { list-style: none; }
        .item-row {
            padding: 8px;
            margin: 4px 0;
            background: #2a2a4e;
            border-radius: 4px;
            cursor: pointer;
        }
        .item-row:hover { background: #3a3a5e; }
        .item-row.selected { border: 2px solid #f1c40f; }
        .close-btn {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background: #e74c3c;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
        }
        .use-btn {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            background: #27ae60;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        .equip-btn {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            background: #3498db;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        .drop-btn {
            margin-top: 5px;
            width: 100%;
            padding: 8px;
            background: #c0392b;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 12px;
        }
        /* Colors */
        .c-normal { color: #fff; }
        .c-magic { color: #3498db; }
        .c-rare { color: #f1c40f; }
        .c-unique { color: #e67e22; }
        .c-legend { color: #9b59b6; }
        .c-set { color: #2ecc71; }
        .c-red { color: #e74c3c; }
        .c-green { color: #2ecc71; }
        .c-cyan { color: #00bcd4; }
        .c-gray { color: #888; }
        .c-flame { color: #3498db; }
        /* Title screen */
        #title-screen {
            text-align: center;
            padding: 40px;
        }
        #title-screen h1 {
            font-size: 32px;
            color: #f1c40f;
            margin-bottom: 30px;
        }
        .title-btn {
            display: block;
            width: 200px;
            margin: 10px auto;
            padding: 15px;
            font-size: 18px;
            background: #2d4a6a;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
        }
        .title-btn:hover { background: #4a6a8a; }
        .title-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        /* Equipment detail */
        .equip-detail {
            background: #2a2a4e;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }
        .equip-slot {
            padding: 5px;
            margin: 3px 0;
            background: #1a1a2e;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .equip-slot:hover { background: #2a2a3e; }
        .negative { color: #e74c3c; }
        /* Status screen */
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #333;
        }
        .stat-label { color: #888; }
        .stat-value { font-weight: bold; }
        /* Town */
        #town-screen {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .town-title {
            font-size: 24px;
            color: #3498db;
            margin-bottom: 20px;
        }
        .npc-dialogue {
            background: #0f0f23;
            border: 1px solid #3498db;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            text-align: left;
            white-space: pre-line;
            font-size: 13px;
            line-height: 1.6;
        }
        .town-menu {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        .town-btn {
            padding: 12px 20px;
            background: #2d4a6a;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        .town-btn:hover { background: #4a6a8a; }
        .town-btn:disabled { background: #333; color: #666; }
        .soul-bar {
            background: #0f0f23;
            border-radius: 8px;
            padding: 10px;
            margin: 10px 0;
        }
        /* Dungeon select */
        .dungeon-list { list-style: none; }
        .dungeon-item {
            padding: 12px;
            margin: 8px 0;
            background: #2a2a4e;
            border-radius: 8px;
            cursor: pointer;
        }
        .dungeon-item:hover { background: #3a3a5e; }
        .dungeon-item.locked { opacity: 0.5; cursor: not-allowed; }
        @media (max-width: 600px) {
            #map { font-size: 10px; letter-spacing: 1px; }
            #side-panel { width: 100%; }
            .ctrl-btn { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Title Screen -->
        <div id="title-screen">
            <h1>DUNGEON GAME</h1>
            <p style="color:#888;margin-bottom:20px;">~ Diablo-like Dungeon RPG ~</p>
            <button class="title-btn" id="btn-continue" disabled>Continue</button>
            <button class="title-btn" id="btn-new">New Game</button>
        </div>

        <!-- Town Screen -->
        <div id="town-screen">
            <div class="town-title" id="town-name">焚き火</div>
            <div class="soul-bar">
                <span class="c-flame">魂: <span id="town-souls">0</span></span> |
                <span class="c-gray">捧げた魂: <span id="town-offered">0</span></span> |
                <span class="c-cyan">次のレベル: <span id="town-next">50</span></span>
            </div>
            <div class="npc-dialogue" id="npc-dialogue"></div>
            <div class="town-menu">
                <button class="town-btn" id="btn-dungeon">ダンジョンへ</button>
                <button class="town-btn" id="btn-offer-souls">魂を捧げる</button>
                <button class="town-btn" id="btn-stash" disabled>保管箱</button>
                <button class="town-btn" id="btn-shop" disabled>商人</button>
                <button class="town-btn" id="btn-recover" disabled>装備回収</button>
                <button class="town-btn" id="btn-town-inv">持ち物</button>
                <button class="town-btn" id="btn-town-status">ステータス</button>
                <button class="town-btn" id="btn-town-save">セーブ</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" style="display:none;">
            <div id="header">
                <span class="stat"><span id="dungeon-name">深淵</span> B<span id="floor">1</span>F</span>
                <span class="stat">Lv.<span id="level">1</span></span>
                <span class="stat">HP: <span class="hp-bar"><span class="hp-fill" id="hp-bar"></span></span> <span id="hp">50</span>/<span id="max-hp">50</span></span>
                <span class="stat c-rare">G: <span id="gold">0</span></span>
                <span class="stat c-flame">魂: <span id="souls">0</span></span>
            </div>
            <div id="main-area">
                <div id="map-container">
                    <div id="map"></div>
                </div>
                <div id="side-panel">
                    <div style="color:#f1c40f;margin-bottom:10px;">[ EQUIPMENT ]</div>
                    <div id="equipment-list"></div>
                    <div style="color:#888;margin-top:10px;font-size:10px;">Tap slot to change</div>
                </div>
            </div>
            <div id="messages"></div>
            <div id="controls">
                <div class="ctrl-row">
                    <button class="ctrl-btn" data-dir="up">W</button>
                </div>
                <div class="ctrl-row">
                    <button class="ctrl-btn" data-dir="left">A</button>
                    <button class="ctrl-btn" data-dir="down">S</button>
                    <button class="ctrl-btn" data-dir="right">D</button>
                </div>
                <div class="action-btns">
                    <button class="action-btn" id="btn-inventory">Bag</button>
                    <button class="action-btn" id="btn-status">Status</button>
                    <button class="action-btn" id="btn-stairs">Stairs</button>
                    <button class="action-btn flame" id="btn-return-town">帰還</button>
                    <button class="action-btn" id="btn-save">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Inventory Modal -->
    <div class="modal" id="inventory-modal">
        <div class="modal-content">
            <div class="modal-title">INVENTORY (<span id="inv-count">0</span>/20)</div>
            <ul class="item-list" id="inventory-list"></ul>
            <div id="item-detail" class="equip-detail" style="display:none;"></div>
            <button class="close-btn" id="close-inventory">Close</button>
        </div>
    </div>

    <!-- Status Modal -->
    <div class="modal" id="status-modal">
        <div class="modal-content">
            <div class="modal-title">CHARACTER STATUS</div>
            <div id="status-content"></div>
            <button class="close-btn" id="close-status">Close</button>
        </div>
    </div>

    <!-- Equipment Select Modal -->
    <div class="modal" id="equip-modal">
        <div class="modal-content">
            <div class="modal-title" id="equip-modal-title">Select Equipment</div>
            <ul class="item-list" id="equip-select-list"></ul>
            <button class="close-btn" id="close-equip">Cancel</button>
        </div>
    </div>

    <!-- Dungeon Select Modal -->
    <div class="modal" id="dungeon-modal">
        <div class="modal-content">
            <div class="modal-title">ダンジョン選択</div>
            <ul class="dungeon-list" id="dungeon-list"></ul>
            <button class="close-btn" id="close-dungeon">Cancel</button>
        </div>
    </div>

    <!-- Offer Souls Modal -->
    <div class="modal" id="offer-modal">
        <div class="modal-content">
            <div class="modal-title">魂を捧げる</div>
            <div id="offer-content"></div>
            <button class="close-btn" id="close-offer">Cancel</button>
        </div>
    </div>

    <!-- Recovery Modal -->
    <div class="modal" id="recovery-modal">
        <div class="modal-content">
            <div class="modal-title">装備回収</div>
            <div id="recovery-content"></div>
            <button class="close-btn" id="close-recovery">Cancel</button>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div class="modal" id="gameover-modal">
        <div class="modal-content" style="text-align:center;">
            <div class="modal-title" id="gameover-title">GAME OVER</div>
            <p id="gameover-msg"></p>
            <button class="close-btn" id="btn-restart">Return to Title</button>
        </div>
    </div>

<script>

class Town {
    constructor() {
        this.level = 0;
        this.totalSoulsOffered = 0;
        this.firstVisit = true;
        this.stash = [];
    }

    getLevelInfo() { return TOWN_LEVELS[this.level] || TOWN_LEVELS[0]; }
    getNextLevelInfo() { return this.level >= 5 ? null : TOWN_LEVELS[this.level + 1]; }
    soulsToNextLevel() {
        const next = this.getNextLevelInfo();
        return next ? Math.max(0, next.soulReq - this.totalSoulsOffered) : 0;
    }
    offerSouls(amount) {
        this.totalSoulsOffered += amount;
        let leveledUp = false;
        for (let lv = 0; lv <= 5; lv++) {
            if (lv > this.level && this.totalSoulsOffered >= TOWN_LEVELS[lv].soulReq) {
                this.level = lv;
                leveledUp = true;
            }
        }
        return leveledUp;
    }
    hasFeature(f) { return this.getLevelInfo().features.includes(f); }
    toJSON() { return { level: this.level, totalSoulsOffered: this.totalSoulsOffered, firstVisit: this.firstVisit, stash: this.stash }; }
    static fromJSON(d) {
        const t = new Town();
        t.level = d.level || 0;
        t.totalSoulsOffered = d.totalSoulsOffered || 0;
        t.firstVisit = d.firstVisit !== false;
        t.stash = d.stash || [];
        return t;
    }
}

class Game {
    constructor() {
        this.player = null;
        this.dungeon = null;
        this.floor = 1;
        this.dungeonId = 0;
        this.town = new Town();
        this.inTown = false;
        this.messages = [];
        this.gameOver = false;
        this.dungeonsCleared = [];
        this.highestFloors = {0:1,1:1,2:1,3:1};
        this.lostEquipment = [];
        this.deathCount = 0;
        this.tombDeepCleared = false;
        this.liberationEnd = false;
    }

    getDungeonInfo() { return DUNGEONS[this.dungeonId] || DUNGEONS[0]; }
    isDeepMode() { return this.dungeonId === 2 && this.dungeonsCleared.includes(2); }

    start() {
        this.player = new Player();
        this.floor = 1;
        this.dungeonId = 0;
        this.town = new Town();
        this.inTown = true;
        this.dungeonsCleared = [];
        this.highestFloors = {0:1,1:1,2:1,3:1};
        this.lostEquipment = [];
        this.deathCount = 0;
        this.tombDeepCleared = false;
        this.liberationEnd = false;
        this.msg('青い炎の前に立っている……');
    }

    enterDungeon(dungeonId) {
        this.dungeonId = dungeonId;
        this.floor = 1;
        this.inTown = false;
        this.dungeon = new Dungeon();
        this.dungeon.generate(this.floor, this.dungeonId, this.isDeepMode());
        this.player.x = this.dungeon.startX;
        this.player.y = this.dungeon.startY;
        this.player.hp = this.player.getStats().maxHp;
        this.msg(`『${this.getDungeonInfo().name}』に足を踏み入れた`);
        this.save();
    }

    returnToTown() {
        this.inTown = true;
        this.player.hp = this.player.getStats().maxHp;
        this.msg('町に戻った。HPが回復した。');
        this.save();
    }

    msg(text, cls = '') {
        this.messages.push({text, cls});
        if (this.messages.length > 4) this.messages.shift();
    }

    move(dx, dy) {
        if (this.gameOver || this.inTown) return;
        const nx = this.player.x + dx;
        const ny = this.player.y + dy;

        const enemy = this.dungeon.enemyAt(nx, ny);
        if (enemy) {
            this.combat(enemy);
            this.enemyTurn();
            return;
        }

        if (this.dungeon.walkable(nx, ny)) {
            this.player.x = nx;
            this.player.y = ny;
            const item = this.dungeon.itemAt(nx, ny);
            if (item) this.pickup(item);
            if (nx === this.dungeon.stairsX && ny === this.dungeon.stairsY) {
                this.msg('階段発見！[Stairs]で次へ', 'c-cyan');
            }
            this.enemyTurn();
        }
    }

    pickup(item) {
        this.dungeon.items = this.dungeon.items.filter(i => i !== item);
        if (item.type === 'gold') {
            const stats = this.player.getStats();
            const amt = Math.floor(item.amount * (1 + (stats.goldFind || 0) / 100));
            this.player.gold += amt;
            this.msg(`+${amt}G`, 'c-rare');
        } else if (item.type === 'potion') {
            if (this.player.inventory.length < 20) {
                this.player.inventory.push(item);
                this.msg('回復薬入手！', 'c-legend');
            } else {
                this.msg('持ち物満杯！', 'c-red');
                this.dungeon.items.push(item);
            }
        } else if (item.type === 'equip') {
            if (this.player.inventory.length < 20) {
                this.player.inventory.push(item);
                this.msg(`${item.equip.name}`, RARITY[item.equip.rarity].cls);
            } else {
                this.msg('持ち物満杯！', 'c-red');
                this.dungeon.items.push(item);
            }
        }
    }

    combat(enemy) {
        const stats = this.player.getStats();

        // Hit check
        if (randInt(1, 100) > (stats.accuracy || 80)) {
            this.msg(`MISS! ${enemy.name}`, 'c-gray');
            return;
        }

        let dmg = randInt(stats.dmgMin, stats.dmgMax);
        dmg = Math.floor(dmg * (100 + (stats.physDmgInc || 0)) / 100);
        const crit = randInt(1, 100) <= stats.crit;
        if (crit) dmg = Math.floor(dmg * stats.critDmg / 100);
        dmg = Math.max(1, dmg - Math.floor(enemy.armor / 2));

        const fireDmg = Math.floor((stats.fireDmg || 0) * (100 + (stats.fireDmgInc || 0)) / 100);
        const coldDmg = Math.floor((stats.coldDmg || 0) * (100 + (stats.coldDmgInc || 0)) / 100);
        const ltnDmg = Math.floor((stats.ltnDmg || 0) * (100 + (stats.ltnDmgInc || 0)) / 100);
        const elem = fireDmg + coldDmg + ltnDmg + (stats.darkDmg || 0);
        const total = dmg + elem;
        enemy.hp -= total;
        this.msg(`${crit?'CRIT! ':''}${enemy.name}に${total}dmg`, crit?'c-rare':'');

        // Life leech
        if (stats.lifeLeech > 0 && dmg > 0) {
            const leech = Math.max(1, Math.floor(dmg * stats.lifeLeech / 100));
            this.player.hp = Math.min(stats.maxHp, this.player.hp + leech);
        }

        if (enemy.hp <= 0) {
            const expBonus = stats.expBonus || 0;
            const exp = Math.floor(enemy.exp * (1 + expBonus / 100));
            this.player.exp += exp;
            this.player.gold += Math.floor(enemy.gold * (1 + (stats.goldFind || 0) / 100));
            this.player.souls += enemy.soul;
            this.msg(`+${exp}EXP +${enemy.soul}魂`, 'c-green');
            this.dungeon.enemies = this.dungeon.enemies.filter(e => e !== enemy);

            // Life on kill
            if (stats.lifeOnKill > 0) {
                this.player.hp = Math.min(stats.maxHp, this.player.hp + stats.lifeOnKill);
            }

            this.checkLevelUp();

            // Final boss check
            if (enemy.name === FINAL_BOSS.name) {
                this.triggerLiberationEnd();
            }
        }
    }

    triggerLiberationEnd() {
        this.liberationEnd = true;
        this.gameOver = true;
        localStorage.removeItem('dungeonSave');
        document.getElementById('gameover-title').textContent = '★★★ 解放END ★★★';
        document.getElementById('gameover-msg').innerHTML = `
            虚無の王が崩れ落ちる……<br><br>
            長い沈黙の後、闇が薄れていく。<br>
            どこか遠くで、光が見えた気がした。<br><br>
            レベル: ${this.player.level}<br>
            死亡回数: ${this.deathCount}<br>
            町の発展: ${this.town.getLevelInfo().name}
        `;
        document.getElementById('gameover-modal').classList.add('active');
    }

    checkLevelUp() {
        while (this.player.exp >= this.player.expNext) {
            this.player.exp -= this.player.expNext;
            this.player.level++;
            this.player.expNext = Math.floor(this.player.expNext * 1.3);
            this.player.baseHp += 10;
            this.player.statPoints += 5;
            this.player.hp = this.player.getStats().maxHp;
            this.msg(`Level UP! Lv.${this.player.level}`, 'c-rare');
        }
    }

    enemyTurn() {
        const stats = this.player.getStats();
        for (const e of this.dungeon.enemies) {
            const dist = Math.abs(e.x - this.player.x) + Math.abs(e.y - this.player.y);
            if (dist === 1) {
                if (randInt(1,100) <= stats.eva) { this.msg(`${e.name}回避！`,'c-green'); continue; }
                if (randInt(1,100) <= stats.block) { this.msg(`${e.name}ブロック！`,'c-cyan'); continue; }
                let phys = Math.max(1, randInt(e.atkMin, e.atkMax) - Math.floor(stats.armor/3));
                let elemFire = Math.floor((e.fireDmg||0)*(100-stats.fireRes)/100);
                let elemCold = Math.floor((e.coldDmg||0)*(100-stats.coldRes)/100);
                let elemLtn = Math.floor((e.ltnDmg||0)*(100-stats.ltnRes)/100);
                let elemDark = Math.floor((e.darkDmg||0)*(100-stats.darkRes)/100);
                let total = phys + elemFire + elemCold + elemLtn + elemDark;
                this.player.hp -= total;
                this.msg(`${e.name}から${total}dmg！`, 'c-red');
                if (this.player.hp <= 0) {
                    this.handleDeath();
                    return;
                }
            } else if (dist <= 6) {
                const dx = e.x < this.player.x ? 1 : (e.x > this.player.x ? -1 : 0);
                const dy = e.y < this.player.y ? 1 : (e.y > this.player.y ? -1 : 0);
                const nx = e.x + dx, ny = e.y + dy;
                if (this.dungeon.walkable(nx,ny) && !this.dungeon.enemyAt(nx,ny) && !(nx===this.player.x && ny===this.player.y)) {
                    e.x = nx; e.y = ny;
                }
            }
        }
    }

    handleDeath() {
        this.deathCount++;

        // Save lost equipment
        this.lostEquipment = [];
        for (const slot of EQUIP_SLOTS) {
            if (this.player.equipment[slot]) {
                this.lostEquipment.push({...this.player.equipment[slot]});
            }
        }
        for (const item of this.player.inventory) {
            if (item.type === 'equip') {
                this.lostEquipment.push({...item.equip});
            }
        }

        // Reset player but keep level/stats
        const level = this.player.level;
        const exp = this.player.exp;
        const expNext = this.player.expNext;
        const statPoints = this.player.statPoints;
        const baseStr = this.player.baseStr;
        const baseDex = this.player.baseDex;
        const baseInt = this.player.baseInt;
        const baseHp = this.player.baseHp;
        const gold = Math.floor(this.player.gold / 2);
        const souls = this.player.souls;

        this.player = new Player();
        this.player.level = level;
        this.player.exp = exp;
        this.player.expNext = expNext;
        this.player.statPoints = statPoints;
        this.player.baseStr = baseStr;
        this.player.baseDex = baseDex;
        this.player.baseInt = baseInt;
        this.player.baseHp = baseHp;
        this.player.gold = gold;
        this.player.souls = souls;
        this.player.hp = this.player.getStats().maxHp;

        this.floor = 1;
        this.inTown = true;
        this.msg('倒れた……町に戻された', 'c-red');
        this.save();
    }

    descend() {
        if (!this.dungeon || this.player.x !== this.dungeon.stairsX || this.player.y !== this.dungeon.stairsY) {
            this.msg('階段の上にいない！', 'c-red');
            return;
        }

        const info = this.getDungeonInfo();
        this.floor++;

        // Dungeon clear check
        if (this.floor > info.maxFloor) {
            if (!this.dungeonsCleared.includes(this.dungeonId)) {
                this.dungeonsCleared.push(this.dungeonId);
            }

            if (this.dungeonId === 2 && this.dungeonsCleared.includes(2)) {
                this.tombDeepCleared = true;
            }

            this.msg(`『${info.name}』踏破！`, 'c-green');
            this.floor = 1;
            this.inTown = true;
            this.player.hp = this.player.getStats().maxHp;
            this.save();
            return;
        }

        this.dungeon = new Dungeon();
        this.dungeon.generate(this.floor, this.dungeonId, this.isDeepMode());
        this.player.x = this.dungeon.startX;
        this.player.y = this.dungeon.startY;
        this.highestFloors[this.dungeonId] = Math.max(this.highestFloors[this.dungeonId] || 1, this.floor);
        this.msg(`--- B${this.floor}F ---`, 'c-cyan');
        this.save();
    }

    save() {
        const data = {
            floor: this.floor,
            dungeonId: this.dungeonId,
            dungeonsCleared: this.dungeonsCleared,
            highestFloors: this.highestFloors,
            player: this.player.toJSON(),
            dungeon: this.dungeon ? this.dungeon.toJSON() : null,
            town: this.town.toJSON(),
            inTown: this.inTown,
            messages: this.messages,
            lostEquipment: this.lostEquipment,
            deathCount: this.deathCount,
            tombDeepCleared: this.tombDeepCleared,
            liberationEnd: this.liberationEnd
        };
        localStorage.setItem('dungeonSave', JSON.stringify(data));
    }

    load() {
        const raw = localStorage.getItem('dungeonSave');
        if (!raw) return false;
        try {
            const data = JSON.parse(raw);
            this.floor = data.floor;
            this.dungeonId = data.dungeonId || 0;
            this.dungeonsCleared = data.dungeonsCleared || [];
            this.highestFloors = data.highestFloors || {0:1,1:1,2:1,3:1};
            this.player = Player.fromJSON(data.player);
            this.town = Town.fromJSON(data.town || {});
            this.inTown = data.inTown !== false;
            this.messages = data.messages || [];
            this.lostEquipment = data.lostEquipment || [];
            this.deathCount = data.deathCount || 0;
            this.tombDeepCleared = data.tombDeepCleared || false;
            this.liberationEnd = data.liberationEnd || false;
            if (data.dungeon && !this.inTown) {
                this.dungeon = Dungeon.fromJSON(data.dungeon);
            }
            return true;
        } catch(e) { return false; }
    }
}

// ==================== PLAYER ====================
class Player {
    constructor() {
        this.x = 0; this.y = 0;
        this.level = 1; this.exp = 0; this.expNext = 30;
        this.statPoints = 0;
        this.baseStr = 10; this.baseDex = 10; this.baseInt = 10;
        this.baseHp = 50; this.hp = 50;
        this.gold = 0;
        this.souls = 0;
        this.equipment = {};
        this.inventory = [];
    }

    getStats() {
        const s = {
            str: this.baseStr, dex: this.baseDex, int: this.baseInt,
            maxHp: this.baseHp, dmgMin: 2, dmgMax: 5,
            fireDmg: 0, coldDmg: 0, ltnDmg: 0, darkDmg: 0,
            crit: 5, critDmg: 150, armor: 0, eva: 0, block: 0,
            fireRes: 0, coldRes: 0, ltnRes: 0, darkRes: 0, hpRegen: 0,
            accuracy: 80, lifeLeech: 0, lifeOnKill: 0,
            physDmgInc: 0, fireDmgInc: 0, coldDmgInc: 0, ltnDmgInc: 0,
            goldFind: 0, expBonus: 0
        };

        for (const slot of EQUIP_SLOTS) {
            const eq = this.equipment[slot];
            if (eq) {
                const total = eq.getTotalStats();
                for (const k in total) {
                    const mapped = statKeyMap(k);
                    if (mapped in s) s[mapped] += total[k];
                }
            }
        }

        // Set bonuses
        const setCounts = {};
        for (const slot of EQUIP_SLOTS) {
            const eq = this.equipment[slot];
            if (eq && eq.setName) {
                setCounts[eq.setName] = (setCounts[eq.setName] || 0) + 1;
            }
        }
        for (const setName in setCounts) {
            const set = SETS[setName];
            if (set) {
                for (const reqCount in set.bonuses) {
                    if (setCounts[setName] >= parseInt(reqCount)) {
                        const bonus = set.bonuses[reqCount];
                        for (const k in bonus) {
                            const mapped = statKeyMap(k);
                            if (mapped in s) s[mapped] += bonus[k];
                        }
                    }
                }
            }
        }

        s.fireRes = Math.min(75, s.fireRes);
        s.coldRes = Math.min(75, s.coldRes);
        s.ltnRes = Math.min(75, s.ltnRes);
        s.darkRes = Math.min(75, s.darkRes);
        s.eva = Math.min(75, s.eva);
        s.block = Math.min(75, s.block);

        return s;
    }

    canEquip(eq) {
        const s = this.getStats();
        return s.str >= (eq.reqStr||0) && s.dex >= (eq.reqDex||0) && s.int >= (eq.reqInt||0);
    }

    equip(eq, slot) {
        const type = EQUIP_TYPES[eq.type];
        const unequipped = [];

        if (type.twoHand) {
            if (this.equipment.mainHand) unequipped.push(this.equipment.mainHand);
            if (this.equipment.offHand) unequipped.push(this.equipment.offHand);
            this.equipment.mainHand = eq;
            this.equipment.offHand = null;
        } else {
            if (slot === 'offHand' && this.equipment.mainHand && EQUIP_TYPES[this.equipment.mainHand.type].twoHand) {
                unequipped.push(this.equipment.mainHand);
                this.equipment.mainHand = null;
            }
            if (this.equipment[slot]) unequipped.push(this.equipment[slot]);
            this.equipment[slot] = eq;
        }
        return unequipped;
    }

    toJSON() {
        const eq = {};
        for (const slot of EQUIP_SLOTS) {
            eq[slot] = this.equipment[slot] ? this.equipment[slot].toJSON() : null;
        }
        return {
            x: this.x, y: this.y, level: this.level, exp: this.exp, expNext: this.expNext,
            statPoints: this.statPoints,
            baseStr: this.baseStr, baseDex: this.baseDex, baseInt: this.baseInt,
            baseHp: this.baseHp, hp: this.hp, gold: this.gold, souls: this.souls,
            equipment: eq,
            inventory: this.inventory.map(i => i.type === 'equip' ? {type:'equip',equip:i.equip.toJSON()} : i)
        };
    }

    static fromJSON(d) {
        const p = new Player();
        Object.assign(p, {x:d.x,y:d.y,level:d.level,exp:d.exp,expNext:d.expNext,
            statPoints:d.statPoints||0,
            baseStr:d.baseStr,baseDex:d.baseDex,baseInt:d.baseInt,baseHp:d.baseHp,hp:d.hp,
            gold:d.gold,souls:d.souls||0});
        for (const slot of EQUIP_SLOTS) {
            p.equipment[slot] = d.equipment[slot] ? Equipment.fromJSON(d.equipment[slot]) : null;
        }
        p.inventory = d.inventory.map(i => i.type === 'equip' ? {type:'equip',equip:Equipment.fromJSON(i.equip)} : i);
        return p;
    }
}

// ==================== EQUIPMENT ====================
class Equipment {
    constructor(name, baseName, type, rarity, tier, stats, reqStr=0, reqDex=0, reqInt=0, setName='') {
        this.name = name;
        this.baseName = baseName;
        this.type = type;
        this.rarity = rarity;
        this.tier = tier;
        this.stats = stats;
        this.reqStr = reqStr;
        this.reqDex = reqDex;
        this.reqInt = reqInt;
        this.setName = setName;
        this.prefixes = [];
        this.suffixes = [];
    }

    getTotalStats() {
        const total = {...this.stats};
        for (const p of this.prefixes) {
            for (const k in p.stats) total[k] = (total[k]||0) + p.stats[k];
        }
        for (const s of this.suffixes) {
            for (const k in s.stats) total[k] = (total[k]||0) + s.stats[k];
        }
        return total;
    }

    getFullName() {
        const tierName = TIER[this.tier].name;
        let name = tierName + this.baseName;
        for (const p of this.prefixes) name = p.name + name;
        for (const s of this.suffixes) name = name + 'の' + s.name;
        return name;
    }

    calcScore() {
        const rarityMult = {NORMAL:1,MAGIC:2,RARE:4,UNIQUE:10,LEGEND:15,SET:12}[this.rarity] || 1;
        const tierMult = {CRUDE:0.5,COMMON:1,FINE:1.5,MASTERWORK:2.5,SUPREME:4}[this.tier] || 1;
        const stats = this.getTotalStats();
        const statSum = Object.values(stats).reduce((a,b) => a + Math.abs(b), 0);
        return Math.max(5, Math.floor((10 + statSum / 2) * rarityMult * tierMult));
    }

    calcRecoveryCost() { return Math.max(5, Math.floor(this.calcScore() * 1.5)); }

    toJSON() {
        return {
            name: this.name, baseName: this.baseName, type: this.type,
            rarity: this.rarity, tier: this.tier, stats: this.stats,
            reqStr: this.reqStr, reqDex: this.reqDex, reqInt: this.reqInt,
            setName: this.setName, prefixes: this.prefixes, suffixes: this.suffixes
        };
    }

    static fromJSON(d) {
        const eq = new Equipment(d.name, d.baseName, d.type, d.rarity, d.tier||'COMMON', d.stats, d.reqStr, d.reqDex, d.reqInt, d.setName||'');
        eq.prefixes = d.prefixes || [];
        eq.suffixes = d.suffixes || [];
        return eq;
    }
}

function generateEquipment(floor, dungeonId = 0) {
    const roll = Math.random();
    let rarity;
    if (roll < 0.45) rarity = 'NORMAL';
    else if (roll < 0.75) rarity = 'MAGIC';
    else if (roll < 0.93) rarity = 'RARE';
    else if (roll < 0.96) rarity = 'UNIQUE';
    else if (roll < 0.99) rarity = 'LEGEND';
    else rarity = 'SET';

    // Set
    if (rarity === 'SET' && floor >= SET_MIN_FLOOR) {
        const setNames = Object.keys(SETS);
        const setName = setNames[randInt(0, setNames.length-1)];
        const set = SETS[setName];
        const pieceNames = Object.keys(set.pieces);
        const pieceName = pieceNames[randInt(0, pieceNames.length-1)];
        const piece = set.pieces[pieceName];
        const eq = new Equipment(pieceName, pieceName, piece.type, 'SET', 'COMMON', {...piece.stats}, piece.reqStr||0, piece.reqDex||0, piece.reqInt||0, setName);
        addAffixes(eq, 3, 3, floor);
        return eq;
    }
    if (rarity === 'SET') rarity = 'LEGEND';

    // Unique
    if (rarity === 'UNIQUE') {
        const available = UNIQUES.filter(u => floor >= UNIQUE_TIER_FLOORS[u.tier]);
        if (available.length > 0) {
            const weights = available.map(u => 1 / Math.pow(2, u.tier));
            const u = weightedRandom(available, weights);
            const stats = {...u.stats};
            if (u.neg) for (const k in u.neg) stats[k] = (stats[k]||0) + u.neg[k];
            const eq = new Equipment(u.name, u.name, u.type, 'UNIQUE', 'COMMON', stats, u.reqStr||0, u.reqDex||0, u.reqInt||0);
            addAffixes(eq, 3, 3, floor);
            return eq;
        }
        rarity = 'RARE';
    }

    // Legend
    if (rarity === 'LEGEND' && floor >= 8) {
        const types = Object.keys(EQUIP_TYPES);
        const type = types[randInt(0, types.length-1)];
        const bases = EQUIP_TYPES[type].bases;
        const base = bases[randInt(0, bases.length-1)];
        const tier = floor < 10 ? 'MASTERWORK' : 'SUPREME';
        const mult = TIER[tier].mult;
        const stats = {};
        for (const k in base) {
            if (!['name','reqStr','reqDex','reqInt'].includes(k)) stats[k] = Math.floor((base[k]||0) * mult);
        }
        const eq = new Equipment(base.name, base.name, type, 'LEGEND', tier, stats,
            Math.floor((base.reqStr||0)*TIER[tier].req), Math.floor((base.reqDex||0)*TIER[tier].req), Math.floor((base.reqInt||0)*TIER[tier].req));
        addAffixes(eq, 3, 3, floor);
        eq.name = eq.getFullName();
        return eq;
    }
    if (rarity === 'LEGEND') rarity = 'RARE';

    // Normal/Magic/Rare
    const types = Object.keys(EQUIP_TYPES);
    const type = types[randInt(0, types.length-1)];
    const bases = EQUIP_TYPES[type].bases;
    const maxIdx = Math.min(bases.length, 1 + Math.floor(floor/3));
    const base = bases[randInt(0, maxIdx-1)];

    const tier = selectTier(floor);
    const mult = TIER[tier].mult;
    const reqMult = TIER[tier].req;

    const stats = {};
    for (const k in base) {
        if (!['name','reqStr','reqDex','reqInt'].includes(k)) stats[k] = Math.floor((base[k]||0) * mult);
    }

    const eq = new Equipment(base.name, base.name, type, rarity, tier, stats,
        reqMult > 0 ? Math.floor((base.reqStr||0)*reqMult) : 0,
        reqMult > 0 ? Math.floor((base.reqDex||0)*reqMult) : 0,
        reqMult > 0 ? Math.floor((base.reqInt||0)*reqMult) : 0);

    const affixCount = RARITY[rarity].affixes;
    addAffixes(eq, affixCount, affixCount, floor);
    eq.name = eq.getFullName();
    return eq;
}

function selectTier(floor) {
    const available = Object.keys(TIER_FLOORS).filter(t => floor >= TIER_FLOORS[t]);
    if (available.length === 0) return 'CRUDE';
    const weights = available.map(t => {
        const tierLv = Object.keys(TIER_FLOORS).indexOf(t) + 1;
        const minFloor = TIER_FLOORS[t];
        const freshness = Math.max(0.3, 1.0 - (floor - minFloor) * 0.06);
        const penalty = tierLv <= 2 ? Math.max(0.1, 1.0 - (floor-1)*0.08) : 1.0;
        return Math.max(0.05, freshness * penalty);
    });
    return weightedRandom(available, weights);
}

function addAffixes(eq, numPre, numSuf, floor) {
    const scale = 1 + floor * 0.08;
    const availPre = [...PREFIXES];
    for (let i = 0; i < randInt(0, numPre); i++) {
        if (availPre.length === 0) break;
        const idx = randInt(0, availPre.length-1);
        const p = availPre.splice(idx, 1)[0];
        const stats = {};
        for (const k in p.stats) stats[k] = Math.floor(p.stats[k] * scale * (0.8 + Math.random()*0.4));
        eq.prefixes.push({name: p.name, stats});
    }
    const availSuf = [...SUFFIXES];
    for (let i = 0; i < randInt(0, numSuf); i++) {
        if (availSuf.length === 0) break;
        const idx = randInt(0, availSuf.length-1);
        const s = availSuf.splice(idx, 1)[0];
        const stats = {};
        for (const k in s.stats) stats[k] = Math.floor(s.stats[k] * scale * (0.8 + Math.random()*0.4));
        eq.suffixes.push({name: s.name, stats});
    }
}

// ==================== DUNGEON ====================
class Dungeon {
    constructor() {
        this.tiles = [];
        this.enemies = [];
        this.items = [];
        this.stairsX = 0; this.stairsY = 0;
        this.startX = 0; this.startY = 0;
    }

    generate(floor, dungeonId = 0, deepMode = false) {
        this.tiles = Array(MAP_HEIGHT).fill(null).map(() => Array(MAP_WIDTH).fill(TILE.WALL));
        this.enemies = [];
        this.items = [];
        const rooms = [];

        for (let i = 0; i < MAX_ROOMS; i++) {
            const w = randInt(ROOM_MIN, ROOM_MAX);
            const h = randInt(ROOM_MIN, ROOM_MAX);
            const x = randInt(1, MAP_WIDTH - w - 1);
            const y = randInt(1, MAP_HEIGHT - h - 1);

            let overlap = false;
            for (const r of rooms) {
                if (x <= r.x2 && x+w >= r.x1 && y <= r.y2 && y+h >= r.y1) { overlap = true; break; }
            }
            if (overlap) continue;

            for (let ry = y; ry < y+h; ry++) {
                for (let rx = x; rx < x+w; rx++) {
                    this.tiles[ry][rx] = TILE.FLOOR;
                }
            }

            if (rooms.length > 0) {
                const prev = rooms[rooms.length-1];
                const cx1 = Math.floor((prev.x1+prev.x2)/2), cy1 = Math.floor((prev.y1+prev.y2)/2);
                const cx2 = Math.floor(x + w/2), cy2 = Math.floor(y + h/2);
                if (Math.random() < 0.5) {
                    for (let tx = Math.min(cx1,cx2); tx <= Math.max(cx1,cx2); tx++) this.tiles[cy1][tx] = TILE.FLOOR;
                    for (let ty = Math.min(cy1,cy2); ty <= Math.max(cy1,cy2); ty++) this.tiles[ty][cx2] = TILE.FLOOR;
                } else {
                    for (let ty = Math.min(cy1,cy2); ty <= Math.max(cy1,cy2); ty++) this.tiles[ty][cx1] = TILE.FLOOR;
                    for (let tx = Math.min(cx1,cx2); tx <= Math.max(cx1,cx2); tx++) this.tiles[cy2][tx] = TILE.FLOOR;
                }
            }

            rooms.push({x1:x, y1:y, x2:x+w-1, y2:y+h-1});
        }

        if (rooms.length > 0) {
            const first = rooms[0];
            this.startX = Math.floor((first.x1+first.x2)/2);
            this.startY = Math.floor((first.y1+first.y2)/2);
            const last = rooms[rooms.length-1];
            this.stairsX = Math.floor((last.x1+last.x2)/2);
            this.stairsY = Math.floor((last.y1+last.y2)/2);
            this.tiles[this.stairsY][this.stairsX] = TILE.STAIRS;
        }

        // Boss floor
        const info = DUNGEONS[dungeonId];
        if (info && info.bossFloor) {
            if (rooms.length >= 2) {
                const bossRoom = rooms[rooms.length-1];
                const bx = Math.floor((bossRoom.x1+bossRoom.x2)/2);
                const by = Math.floor((bossRoom.y1+bossRoom.y2)/2);
                this.enemies.push({...FINAL_BOSS, x: bx, y: by, hp: FINAL_BOSS.hp});
            }
        } else {
            // Spawn enemies
            const enemyList = DUNGEON_ENEMIES[dungeonId] || ENEMIES_ABYSS;
            const scale = deepMode ? 1 + floor / 99 * 1.5 : 1 + (floor - 1) * 0.15;

            for (let i = 1; i < rooms.length; i++) {
                const r = rooms[i];
                const count = randInt(1, 3);
                for (let j = 0; j < count; j++) {
                    const ex = randInt(r.x1+1, r.x2-1);
                    const ey = randInt(r.y1+1, r.y2-1);
                    if (!this.enemyAt(ex, ey)) {
                        const available = enemyList.filter(e =>
                            floor >= (e.minFloor || 1) && floor <= (e.maxFloor || 9999));
                        if (available.length > 0) {
                            const weights = available.map((_, i) => 1/(i+1));
                            const template = weightedRandom(available, weights);
                            this.enemies.push({
                                x: ex, y: ey, name: template.name, char: template.char,
                                hp: Math.floor(template.hp * scale), maxHp: Math.floor(template.hp * scale),
                                atkMin: Math.floor(template.atkMin * scale), atkMax: Math.floor(template.atkMax * scale),
                                armor: Math.floor((template.armor||0) * scale),
                                fireDmg: Math.floor((template.fireDmg||0) * scale),
                                coldDmg: Math.floor((template.coldDmg||0) * scale),
                                ltnDmg: Math.floor((template.ltnDmg||0) * scale),
                                darkDmg: Math.floor((template.darkDmg||0) * scale),
                                exp: Math.floor(template.exp * scale), gold: Math.floor(template.gold * scale),
                                soul: Math.floor((template.soul||1) * scale)
                            });
                        }
                    }
                }
            }
        }

        // Spawn items
        for (const r of rooms) {
            const count = randInt(0, 2);
            for (let j = 0; j < count; j++) {
                const ix = randInt(r.x1+1, r.x2-1);
                const iy = randInt(r.y1+1, r.y2-1);
                if (!this.itemAt(ix, iy)) {
                    const roll = Math.random();
                    if (roll < 0.3) {
                        const goldMult = deepMode ? 2 : 1;
                        this.items.push({type:'gold', x:ix, y:iy, amount: Math.floor(randInt(5,20)*floor*goldMult)});
                    } else if (roll < 0.5) {
                        this.items.push({type:'potion', x:ix, y:iy, heal: 20+floor*5});
                    } else {
                        const eqFloor = deepMode ? floor + 20 : floor;
                        this.items.push({type:'equip', x:ix, y:iy, equip: generateEquipment(eqFloor, dungeonId)});
                    }
                }
            }
        }
    }

    walkable(x, y) {
        return x >= 0 && x < MAP_WIDTH && y >= 0 && y < MAP_HEIGHT && this.tiles[y][x] !== TILE.WALL;
    }
    enemyAt(x, y) { return this.enemies.find(e => e.x === x && e.y === y); }
    itemAt(x, y) { return this.items.find(i => i.x === x && i.y === y); }

    toJSON() {
        return {
            tiles: this.tiles.map(row => row.join('')),
            enemies: this.enemies,
            items: this.items.map(i => i.type === 'equip' ? {...i, equip: i.equip.toJSON()} : i),
            stairsX: this.stairsX, stairsY: this.stairsY,
            startX: this.startX, startY: this.startY
        };
    }

    static fromJSON(d) {
        const dg = new Dungeon();
        dg.tiles = d.tiles.map(row => row.split(''));
        dg.enemies = d.enemies;
        dg.items = d.items.map(i => i.type === 'equip' ? {...i, equip: Equipment.fromJSON(i.equip)} : i);
        dg.stairsX = d.stairsX; dg.stairsY = d.stairsY;
        dg.startX = d.startX; dg.startY = d.startY;
        return dg;
    }
}

// ==================== UTILITIES ====================
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function weightedRandom(items, weights) {
    const total = weights.reduce((a,b) => a+b, 0);
    let r = Math.random() * total;
    for (let i = 0; i < items.length; i++) {
        r -= weights[i];
        if (r <= 0) return items[i];
    }
    return items[items.length-1];
}
function statKeyMap(k) {
    const map = {str:'str',dex:'dex',int:'int',hp:'maxHp',maxHp:'maxHp',dmgMin:'dmgMin',dmgMax:'dmgMax',
        armor:'armor',eva:'eva',block:'block',crit:'crit',critDmg:'critDmg',
        fireDmg:'fireDmg',coldDmg:'coldDmg',ltnDmg:'ltnDmg',darkDmg:'darkDmg',
        fireRes:'fireRes',coldRes:'coldRes',ltnRes:'ltnRes',darkRes:'darkRes',hpRegen:'hpRegen',
        accuracy:'accuracy',lifeLeech:'lifeLeech',lifeOnKill:'lifeOnKill',
        physDmgInc:'physDmgInc',fireDmgInc:'fireDmgInc',coldDmgInc:'coldDmgInc',ltnDmgInc:'ltnDmgInc',
        goldFind:'goldFind',expBonus:'expBonus'};
    return map[k] || k;
}

// ==================== RENDERING ====================
function render() {
    if (!game || !game.player) return;

    const stats = game.player.getStats();
    document.getElementById('level').textContent = game.player.level;
    document.getElementById('hp').textContent = game.player.hp;
    document.getElementById('max-hp').textContent = stats.maxHp;
    document.getElementById('hp-bar').style.width = (game.player.hp / stats.maxHp * 100) + '%';
    document.getElementById('gold').textContent = game.player.gold;
    document.getElementById('souls').textContent = game.player.souls;
    document.getElementById('floor').textContent = game.floor;
    document.getElementById('dungeon-name').textContent = game.getDungeonInfo().name + (game.isDeepMode() ? '【深層】' : '');

    // Map
    let mapHtml = '';
    for (let y = 0; y < MAP_HEIGHT; y++) {
        for (let x = 0; x < MAP_WIDTH; x++) {
            if (x === game.player.x && y === game.player.y) {
                mapHtml += '<span class="c-green">@</span>';
            } else if (game.dungeon.enemyAt(x, y)) {
                const e = game.dungeon.enemyAt(x, y);
                mapHtml += `<span class="c-red">${e.char}</span>`;
            } else if (game.dungeon.itemAt(x, y)) {
                const item = game.dungeon.itemAt(x, y);
                if (item.type === 'equip') mapHtml += '<span class="c-rare">[</span>';
                else if (item.type === 'potion') mapHtml += '<span class="c-legend">!</span>';
                else mapHtml += '<span class="c-rare">$</span>';
            } else if (game.dungeon.tiles[y][x] === TILE.STAIRS) {
                mapHtml += '<span class="c-cyan">></span>';
            } else {
                mapHtml += game.dungeon.tiles[y][x];
            }
        }
        mapHtml += '\n';
    }
    document.getElementById('map').innerHTML = mapHtml;

    // Equipment
    let eqHtml = '';
    for (const slot of EQUIP_SLOTS) {
        const eq = game.player.equipment[slot];
        const name = eq ? `<span class="${RARITY[eq.rarity].cls}">${eq.name.substring(0,10)}</span>` : '<span class="c-gray">---</span>';
        eqHtml += `<div class="equip-slot" data-slot="${slot}">${SLOT_NAMES[slot]}: ${name}</div>`;
    }
    document.getElementById('equipment-list').innerHTML = eqHtml;

    // Messages
    let msgHtml = '';
    for (const m of game.messages) {
        msgHtml += `<div class="msg ${m.cls}">${m.text}</div>`;
    }
    document.getElementById('messages').innerHTML = msgHtml;

    if (game.gameOver && !game.liberationEnd) {
        document.getElementById('gameover-title').textContent = game.player.hp <= 0 ? 'GAME OVER' : 'VICTORY!';
        document.getElementById('gameover-msg').textContent = `Floor: B${game.floor}F | Gold: ${game.player.gold} | Level: ${game.player.level}`;
        document.getElementById('gameover-modal').classList.add('active');
    }
}

function renderTown() {
    if (!game || !game.player) return;

    const town = game.town;
    const info = town.getLevelInfo();

    document.getElementById('town-name').textContent = info.name;
    document.getElementById('town-souls').textContent = game.player.souls;
    document.getElementById('town-offered').textContent = town.totalSoulsOffered;
    document.getElementById('town-next').textContent = town.soulsToNextLevel() || 'MAX';

    // NPC dialogue
    let dialogue;
    if (town.firstVisit) {
        dialogue = NPC_DIALOGUE.firstMeeting;
        town.firstVisit = false;
    } else if (game.lostEquipment.length > 0) {
        dialogue = NPC_DIALOGUE.firstDeath;
    } else if (game.player.souls > 0) {
        dialogue = NPC_DIALOGUE.returnWithSouls[randInt(0, NPC_DIALOGUE.returnWithSouls.length-1)];
    } else {
        dialogue = NPC_DIALOGUE.idle[randInt(0, NPC_DIALOGUE.idle.length-1)];
    }
    document.getElementById('npc-dialogue').textContent = dialogue;

    // Enable/disable buttons
    document.getElementById('btn-stash').disabled = !town.hasFeature('stash');
    document.getElementById('btn-shop').disabled = !town.hasFeature('shop');
    document.getElementById('btn-recover').disabled = game.lostEquipment.length === 0;
}

function renderInventory() {
    const list = document.getElementById('inventory-list');
    document.getElementById('inv-count').textContent = game.player.inventory.length;
    let html = '';
    game.player.inventory.forEach((item, idx) => {
        if (item.type === 'potion') {
            html += `<li class="item-row" data-idx="${idx}" data-type="potion"><span class="c-legend">回復薬</span> HP+${item.heal}</li>`;
        } else {
            const eq = item.equip;
            const canEquip = game.player.canEquip(eq);
            html += `<li class="item-row" data-idx="${idx}" data-type="equip"><span class="${RARITY[eq.rarity].cls}">${eq.name}</span>${canEquip?'':' <span class="c-red">!</span>'}</li>`;
        }
    });
    list.innerHTML = html || '<li class="c-gray">Empty</li>';
    document.getElementById('item-detail').style.display = 'none';
    selectedItemIdx = -1;
}

function showItemDetail(idx) {
    const item = game.player.inventory[idx];
    const detail = document.getElementById('item-detail');
    selectedItemIdx = idx;

    if (item.type === 'potion') {
        detail.innerHTML = `
            <div class="c-legend" style="font-size:16px;">回復薬</div>
            <div style="margin:10px 0;">回復: <span class="c-green">+${item.heal} HP</span></div>
            <button class="use-btn" id="btn-use-potion">使用</button>
            <button class="drop-btn" id="btn-drop-item">捨てる</button>
        `;
        document.getElementById('btn-use-potion').onclick = () => usePotion(idx);
        document.getElementById('btn-drop-item').onclick = () => dropItem(idx);
    } else {
        const eq = item.equip;
        const stats = eq.getTotalStats();
        const canEquip = game.player.canEquip(eq);
        const pStats = game.player.getStats();
        let html = `<div class="${RARITY[eq.rarity].cls}" style="font-size:16px;">${eq.name}</div>`;
        html += `<div class="c-gray">${EQUIP_TYPES[eq.type].name} | ${RARITY[eq.rarity].name}</div>`;
        if (eq.setName) html += `<div class="c-set">Set: ${eq.setName}</div>`;
        if (eq.reqStr || eq.reqDex || eq.reqInt) {
            html += `<div style="margin:5px 0;">必要: `;
            if (eq.reqStr) html += `<span class="${pStats.str >= eq.reqStr ? 'c-green' : 'c-red'}">STR:${eq.reqStr}</span> `;
            if (eq.reqDex) html += `<span class="${pStats.dex >= eq.reqDex ? 'c-green' : 'c-red'}">DEX:${eq.reqDex}</span> `;
            if (eq.reqInt) html += `<span class="${pStats.int >= eq.reqInt ? 'c-green' : 'c-red'}">INT:${eq.reqInt}</span>`;
            html += `</div>`;
        }
        html += `<div class="c-gray" style="margin-top:10px;">--- ステータス ---</div>`;
        for (const k in stats) {
            if (stats[k] !== 0) {
                const isNeg = stats[k] < 0;
                html += `<div class="${isNeg?'negative':''}">${formatStat(k)}: ${stats[k]>0?'+':''}${stats[k]}</div>`;
            }
        }
        html += `<button class="equip-btn" id="btn-equip-item" ${canEquip?'':'disabled'}>装備</button>`;
        html += `<button class="drop-btn" id="btn-drop-item">捨てる</button>`;
        detail.innerHTML = html;
        document.getElementById('btn-equip-item').onclick = () => equipItem(idx);
        document.getElementById('btn-drop-item').onclick = () => dropItem(idx);
    }
    detail.style.display = 'block';
}

function formatStat(k) {
    const names = {dmgMin:'最小ダメージ',dmgMax:'最大ダメージ',armor:'防御',hp:'HP',maxHp:'最大HP',str:'STR',dex:'DEX',int:'INT',
        eva:'回避',block:'ブロック',crit:'クリティカル',critDmg:'クリダメ',
        fireDmg:'炎ダメージ',coldDmg:'氷ダメージ',ltnDmg:'雷ダメージ',darkDmg:'闇ダメージ',
        fireRes:'炎耐性',coldRes:'氷耐性',ltnRes:'雷耐性',darkRes:'闇耐性',hpRegen:'HP再生',
        accuracy:'命中',lifeLeech:'ライフリーチ',lifeOnKill:'キル時HP',
        goldFind:'ゴールド発見',expBonus:'経験値ボーナス'};
    return names[k] || k;
}

function usePotion(idx) {
    const item = game.player.inventory[idx];
    if (item && item.type === 'potion') {
        const stats = game.player.getStats();
        const heal = Math.min(item.heal, stats.maxHp - game.player.hp);
        game.player.hp += heal;
        game.player.inventory.splice(idx, 1);
        game.msg(`HP +${heal}`, 'c-green');
        document.getElementById('inventory-modal').classList.remove('active');
        if (game.inTown) renderTown(); else render();
    }
}

function equipItem(idx) {
    const item = game.player.inventory[idx];
    if (item.type !== 'equip') return;
    const eq = item.equip;
    if (!game.player.canEquip(eq)) return;

    const type = EQUIP_TYPES[eq.type];
    if (type.slots.length === 1) {
        doEquip(idx, type.slots[0]);
    } else {
        showSlotSelect(idx, type.slots);
    }
}

function showSlotSelect(idx, slots) {
    const list = document.getElementById('equip-select-list');
    let html = '';
    for (const slot of slots) {
        const current = game.player.equipment[slot];
        const name = current ? `<span class="${RARITY[current.rarity].cls}">${current.name}</span>` : '<span class="c-gray">Empty</span>';
        html += `<li class="item-row" onclick="doEquip(${idx},'${slot}')">${SLOT_NAMES[slot]}: ${name}</li>`;
    }
    list.innerHTML = html;
    document.getElementById('equip-modal').classList.add('active');
}

function doEquip(idx, slot) {
    const item = game.player.inventory[idx];
    const eq = item.equip;
    game.player.inventory.splice(idx, 1);
    const old = game.player.equip(eq, slot);
    for (const o of old) {
        if (o) game.player.inventory.push({type:'equip', equip: o});
    }
    game.msg(`${eq.name}を装備`, RARITY[eq.rarity].cls);
    document.getElementById('equip-modal').classList.remove('active');
    document.getElementById('inventory-modal').classList.remove('active');
    if (game.inTown) renderTown(); else render();
}

function dropItem(idx) {
    game.player.inventory.splice(idx, 1);
    game.msg('アイテムを捨てた');
    renderInventory();
}

function showEquipSelect(slot) {
    const candidates = game.player.inventory.filter(i => {
        if (i.type !== 'equip') return false;
        const type = EQUIP_TYPES[i.equip.type];
        return type.slots.includes(slot);
    });

    const list = document.getElementById('equip-select-list');
    document.getElementById('equip-modal-title').textContent = `${SLOT_NAMES[slot]} - 装備選択`;
    let html = '';

    const current = game.player.equipment[slot];
    if (current) {
        html += `<li class="item-row c-red" onclick="unequipSlot('${slot}')">[外す] ${current.name}</li>`;
    }

    candidates.forEach((item, i) => {
        const eq = item.equip;
        const canEquip = game.player.canEquip(eq);
        const realIdx = game.player.inventory.indexOf(item);
        html += `<li class="item-row" onclick="doEquip(${realIdx},'${slot}')" ${canEquip?'':'style="opacity:0.5"'}>
            <span class="${RARITY[eq.rarity].cls}">${eq.name}</span>${canEquip?'':' <span class="c-red">!</span>'}</li>`;
    });

    if (!current && candidates.length === 0) {
        html = '<li class="c-gray">装備可能なアイテムがありません</li>';
    }

    list.innerHTML = html;
    document.getElementById('equip-modal').classList.add('active');
}

function unequipSlot(slot) {
    const eq = game.player.equipment[slot];
    if (eq) {
        game.player.inventory.push({type:'equip', equip: eq});
        game.player.equipment[slot] = null;
        game.msg(`${eq.name}を外した`);
    }
    document.getElementById('equip-modal').classList.remove('active');
    if (game.inTown) renderTown(); else render();
}

    const p = game.player;
    const s = p.getStats();

    let html = `
        <div class="stat-row"><span class="stat-label">Level</span><span class="stat-value">${p.level}</span></div>
        <div class="stat-row"><span class="stat-label">EXP</span><span class="stat-value">${p.exp} / ${p.expNext}</span></div>
        <div class="stat-row"><span class="stat-label">HP</span><span class="stat-value c-red">${p.hp} / ${s.maxHp}</span></div>
        <div class="stat-row"><span class="stat-label">Gold</span><span class="stat-value c-rare">${p.gold}</span></div>
        <div class="stat-row"><span class="stat-label">魂</span><span class="stat-value c-flame">${p.souls}</span></div>
        <div style="margin:15px 0;color:#f1c40f;">--- 能力値 ---</div>
        <div class="stat-row"><span class="stat-label">STR</span><span class="stat-value c-red">${s.str}</span></div>
        <div class="stat-row"><span class="stat-label">DEX</span><span class="stat-value c-green">${s.dex}</span></div>
        <div class="stat-row"><span class="stat-label">INT</span><span class="stat-value c-magic">${s.int}</span></div>
        <div style="margin:15px 0;color:#f1c40f;">--- 戦闘 ---</div>
        <div class="stat-row"><span class="stat-label">ダメージ</span><span class="stat-value">${s.dmgMin} - ${s.dmgMax}</span></div>
        <div class="stat-row"><span class="stat-label">命中率</span><span class="stat-value">${s.accuracy}%</span></div>
        <div class="stat-row"><span class="stat-label">防御</span><span class="stat-value">${s.armor}</span></div>

        <div class="stat-row"><span class="stat-label">ブロック</span><span class="stat-value">${s.block}%</span></div>
        <div class="stat-row"><span class="stat-label">クリティカル</span><span class="stat-value">${s.crit}%</span></div>
        <div class="stat-row"><span class="stat-label">クリダメ</span><span class="stat-value">${s.critDmg}%</span></div>
        <div style="margin:15px 0;color:#f1c40f;">--- 属性 ---</div>
        <div class="stat-row"><span class="stat-label">炎ダメ</span><span class="stat-value c-red">${s.fireDmg}</span></div>
        <div class="stat-row"><span class="stat-label">氷ダメ</span><span class="stat-value c-cyan">${s.coldDmg}</span></div>
        <div class="stat-row"><span class="stat-label">雷ダメ</span><span class="stat-value c-rare">${s.ltnDmg}</span></div>
        <div class="stat-row"><span class="stat-label">闇ダメ</span><span class="stat-value c-legend">${s.darkDmg}</span></div>
        <div style="margin:15px 0;color:#f1c40f;">--- 耐性 ---</div>
        <div class="stat-row"><span class="stat-label">炎耐性</span><span class="stat-value c-red">${s.fireRes}%</span></div>
        <div class="stat-row"><span class="stat-label">氷耐性</span><span class="stat-value c-cyan">${s.coldRes}%</span></div>
        <div class="stat-row"><span class="stat-label">雷耐性</span><span class="stat-value c-rare">${s.ltnRes}%</span></div>
        <div class="stat-row"><span class="stat-label">闇耐性</span><span class="stat-value c-legend">${s.darkRes}%</span></div>
    `;
    document.getElementById('status-content').innerHTML = html;
}

function showDungeonSelect() {
    const list = document.getElementById('dungeon-list');
    let html = '';

    for (let id = 0; id <= 3; id++) {
        const info = DUNGEONS[id];
        const cleared = game.dungeonsCleared.includes(id);
        const highest = game.highestFloors[id] || 1;

        // Unlock conditions
        let locked = false;
        let lockReason = '';
        if (id === 1 && !game.dungeonsCleared.includes(0)) {
            locked = true;
            lockReason = '(深淵をクリアで解放)';
        } else if (id === 2 && !game.dungeonsCleared.includes(1)) {
            locked = true;
            lockReason = '(灼熱の坑道をクリアで解放)';
        } else if (id === 3) {
            if (!game.tombDeepCleared || game.town.level < 4) {
                locked = true;
                lockReason = '(墓所【深層】クリア & 町Lv4で解放)';
            }
        }

        const deepMode = id === 2 && game.dungeonsCleared.includes(2);
        const displayName = info.name + (deepMode ? '【深層】' : '');

        html += `<li class="dungeon-item ${locked ? 'locked' : ''}" data-id="${id}" ${locked ? '' : `onclick="selectDungeon(${id})"`}>
            <div><strong>${displayName}</strong> ${cleared ? '<span class="c-green">✓</span>' : ''}</div>
            <div class="c-gray">${info.desc} (${info.maxFloor}F)</div>
            ${locked ? `<div class="c-red">${lockReason}</div>` : `<div class="c-cyan">最高到達: B${highest}F</div>`}
        </li>`;
    }

    list.innerHTML = html;
    document.getElementById('dungeon-modal').classList.add('active');
}

function selectDungeon(id) {
    document.getElementById('dungeon-modal').classList.remove('active');
    game.enterDungeon(id);
    document.getElementById('town-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    render();
}

function showOfferSouls() {
    const content = document.getElementById('offer-content');
    const souls = game.player.souls;
    const town = game.town;
    const nextLevel = town.getNextLevelInfo();
    const toNext = town.soulsToNextLevel();

    let html = `<div style="margin-bottom:15px;">所持魂: <span class="c-flame">${souls}</span></div>`;
    html += `<div style="margin-bottom:15px;">現在の町: <span class="c-cyan">${town.getLevelInfo().name}</span></div>`;

    if (nextLevel) {
        html += `<div style="margin-bottom:15px;">次のレベル: <span class="c-rare">${nextLevel.name}</span> (あと${toNext}魂)</div>`;
    } else {
        html += `<div style="margin-bottom:15px;color:#2ecc71;">町は最大レベルに達しています</div>`;
    }

    if (souls > 0) {
        html += `<button class="use-btn" onclick="offerAllSouls()">全ての魂を捧げる (${souls})</button>`;
    } else {
        html += `<div class="c-gray">捧げる魂がありません</div>`;
    }

    content.innerHTML = html;
    document.getElementById('offer-modal').classList.add('active');
}

function offerAllSouls() {
    const souls = game.player.souls;
    if (souls <= 0) return;

    game.player.souls = 0;
    const leveledUp = game.town.offerSouls(souls);

    if (leveledUp) {
        game.msg(`町が発展した！『${game.town.getLevelInfo().name}』`, 'c-green');
    } else {
        game.msg(`${souls}魂を捧げた`, 'c-flame');
    }

    document.getElementById('offer-modal').classList.remove('active');
    game.save();
    renderTown();
}

function showRecovery() {
    const content = document.getElementById('recovery-content');
    const lost = game.lostEquipment;

    if (lost.length === 0) {
        content.innerHTML = '<div class="c-gray">回収できる装備がありません</div>';
        document.getElementById('recovery-modal').classList.add('active');
        return;
    }

    let html = '<div style="margin-bottom:15px;">失った装備を魂で回収できます</div>';
    html += '<ul class="item-list">';

    lost.forEach((eq, idx) => {
        const cost = eq.calcRecoveryCost ? eq.calcRecoveryCost() : 10;
        const canAfford = game.player.souls >= cost;
        html += `<li class="item-row" style="${canAfford ? '' : 'opacity:0.5'}">
            <span class="${RARITY[eq.rarity].cls}">${eq.name}</span>
            <div class="c-flame">コスト: ${cost}魂 ${canAfford ? '' : '(魂不足)'}</div>
            ${canAfford ? `<button class="use-btn" onclick="recoverEquip(${idx})">回収</button>` : ''}
        </li>`;
    });

    html += '</ul>';
    content.innerHTML = html;
    document.getElementById('recovery-modal').classList.add('active');
}

function recoverEquip(idx) {
    const eq = game.lostEquipment[idx];
    const cost = eq.calcRecoveryCost ? eq.calcRecoveryCost() : 10;

    if (game.player.souls < cost) {
        game.msg('魂が足りません', 'c-red');
        return;
    }

    if (game.player.inventory.length >= 20) {
        game.msg('持ち物が満杯です', 'c-red');
        return;
    }

    game.player.souls -= cost;
    game.player.inventory.push({type: 'equip', equip: eq});
    game.lostEquipment.splice(idx, 1);
    game.msg(`${eq.name}を回収した`, 'c-green');

    document.getElementById('recovery-modal').classList.remove('active');
    game.save();
    renderTown();
}

// ==================== EVENT HANDLERS ====================
document.addEventListener('DOMContentLoaded', () => {
    if (localStorage.getItem('dungeonSave')) {
        document.getElementById('btn-continue').disabled = false;
    }

    document.getElementById('btn-continue').onclick = () => {
        game = new Game();
        if (game.load()) {
            document.getElementById('title-screen').style.display = 'none';
            if (game.inTown) {
                document.getElementById('town-screen').style.display = 'block';
                renderTown();
            } else {
                document.getElementById('game-screen').style.display = 'block';
                render();
            }
        }
    };

    document.getElementById('btn-new').onclick = () => {
        game = new Game();
        game.start();
        document.getElementById('title-screen').style.display = 'none';
        document.getElementById('town-screen').style.display = 'block';
        renderTown();
    };

    // Movement
    document.querySelectorAll('.ctrl-btn').forEach(btn => {
        btn.onclick = () => {
            const dir = btn.dataset.dir;
            const moves = {up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
            if (moves[dir] && !game.inTown) {
                game.move(moves[dir][0], moves[dir][1]);
                render();
            }
        };
    });

    // Keyboard
    document.addEventListener('keydown', e => {
        if (!game || game.gameOver) return;
        if (document.querySelector('.modal.active')) return;
        if (game.inTown) return;
        const keys = {w:[0,-1],a:[-1,0],s:[0,1],d:[1,0],ArrowUp:[0,-1],ArrowLeft:[-1,0],ArrowDown:[0,1],ArrowRight:[1,0]};
        if (keys[e.key]) {
            game.move(keys[e.key][0], keys[e.key][1]);
            render();
            e.preventDefault();
        } else if (e.key === 'Enter') {
            game.descend();
            render();
        } else if (e.key === 'i') {
            renderInventory();
            document.getElementById('inventory-modal').classList.add('active');
        } else if (e.key === 'c') {
            renderStatus();
            document.getElementById('status-modal').classList.add('active');
        }
    });

    // Game buttons
    document.getElementById('btn-inventory').onclick = () => {
        renderInventory();
        document.getElementById('inventory-modal').classList.add('active');
    };

    document.getElementById('btn-status').onclick = () => {
        renderStatus();
        document.getElementById('status-modal').classList.add('active');
    };

    document.getElementById('btn-stairs').onclick = () => {
        if (!game.inTown) {
            game.descend();
            render();
        }
    };

    document.getElementById('btn-return-town').onclick = () => {
        if (!game.inTown) {
            game.returnToTown();
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('town-screen').style.display = 'block';
            renderTown();
        }
    };

    document.getElementById('btn-save').onclick = () => {
        game.save();
        game.msg('セーブしました！', 'c-green');
        render();
    };

    // Town buttons
    document.getElementById('btn-dungeon').onclick = () => showDungeonSelect();
    document.getElementById('btn-offer-souls').onclick = () => showOfferSouls();
    document.getElementById('btn-recover').onclick = () => showRecovery();
    document.getElementById('btn-town-inv').onclick = () => {
        renderInventory();
        document.getElementById('inventory-modal').classList.add('active');
    };
    document.getElementById('btn-town-status').onclick = () => {
        renderStatus();
        document.getElementById('status-modal').classList.add('active');
    };
    document.getElementById('btn-town-save').onclick = () => {
        game.save();
        game.msg('セーブしました！', 'c-green');
        renderTown();
    };

    // Inventory
    document.getElementById('inventory-list').onclick = e => {
        const row = e.target.closest('.item-row');
        if (row) {
            document.querySelectorAll('#inventory-list .item-row').forEach(r => r.classList.remove('selected'));
            row.classList.add('selected');
            showItemDetail(parseInt(row.dataset.idx));
        }
    };

    document.getElementById('close-inventory').onclick = () => {
        document.getElementById('inventory-modal').classList.remove('active');
    };

    document.getElementById('close-status').onclick = () => {
        document.getElementById('status-modal').classList.remove('active');
    };

    document.getElementById('equipment-list').onclick = e => {
        const slot = e.target.closest('.equip-slot');
        if (slot) showEquipSelect(slot.dataset.slot);
    };

    document.getElementById('close-equip').onclick = () => {
        document.getElementById('equip-modal').classList.remove('active');
    };

    document.getElementById('close-dungeon').onclick = () => {
        document.getElementById('dungeon-modal').classList.remove('active');
    };

    document.getElementById('close-offer').onclick = () => {
        document.getElementById('offer-modal').classList.remove('active');
    };

    document.getElementById('close-recovery').onclick = () => {
        document.getElementById('recovery-modal').classList.remove('active');
    };

    document.getElementById('btn-restart').onclick = () => {
        document.getElementById('gameover-modal').classList.remove('active');
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('town-screen').style.display = 'none';
        document.getElementById('title-screen').style.display = 'block';
        document.getElementById('btn-continue').disabled = !localStorage.getItem('dungeonSave');
    };
});
</script>
</body>
</html>
